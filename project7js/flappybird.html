<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Desktop</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #70c5ce;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #hud {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            -webkit-text-stroke: 3px #000;
            text-shadow: 0 4px 5px rgba(0, 0, 0, 0.3);
        }

        .screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .play-btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 900;
            background: #e45f1b;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b3430c;
        }

        .play-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #b3430c;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">0</div>

        <div id="start-screen" class="screen active">
            <button class="play-btn" id="start-btn">START</button>
        </div>
        <div id="game-over-screen" class="screen">
            <button class="play-btn" id="restart-btn">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            bird.reset();
            pipes.reset();
        }
        window.addEventListener('resize', resize);
        resize();

        const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = STATE.START;
        let frames = 0, score = 0;
        let bestScore = localStorage.getItem('flappyBestScore') || 0;

        const GRAVITY = 0.25, JUMP = -6, SPEED = 3.5, PIPE_WIDTH = 90, PIPE_GAP = 260;
        let nextPipeFrame = 100;

        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'keydown') e.preventDefault();
            if (currentState === STATE.START) startGame();
            else if (currentState === STATE.PLAYING) bird.flap();
        }
        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(e); }, { passive: false });
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        function startGame() {
            currentState = STATE.PLAYING;
            startScreen.classList.remove('active');
            hud.style.display = 'block';
            score = 0;
            hud.innerText = score;
            pipes.reset();
            bird.reset();
        }
        function resetGame() {
            currentState = STATE.START;
            gameOverScreen.classList.remove('active');
            startScreen.classList.add('active');
            bird.reset();
            frames = 0;
            pipes.reset();
        }
        function gameOver() {
            currentState = STATE.GAMEOVER;
            hud.style.display = 'none';
            gameOverScreen.classList.add('active');
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }
        }

        // Bird
        const bird = {
            x: 0, y: 0, radius: 20, velocity: 0, rotation: 0,
            reset() { this.x = width * 0.2; this.y = height / 2; this.velocity = 0; this.rotation = 0; },
            flap() { this.velocity = JUMP; },
            update() {
                if (currentState === STATE.START) {
                    this.y = height / 2 + Math.cos(frames / 15) * 6; this.rotation = 0;
                } else {
                    this.velocity += GRAVITY; this.y += this.velocity;
                    if (this.velocity < JUMP + 2) this.rotation = -25 * Math.PI / 180;
                    else { this.rotation += 3.5 * Math.PI / 180; if (this.rotation > 90 * Math.PI / 180) this.rotation = 90 * Math.PI / 180; }
                    if (this.y + this.radius >= height - 90) { this.y = height - 90 - this.radius; gameOver(); }
                    if (this.y - this.radius <= 0) { this.y = this.radius; this.velocity = 0; }
                }
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, 2 * Math.PI); ctx.fillStyle = '#FFEE00'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.arc(8, -8, 5, 0, 2 * Math.PI); ctx.fillStyle = '#fff'; ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(10, -8, 2, 0, 2 * Math.PI); ctx.fillStyle = '#000'; ctx.fill();
                ctx.beginPath(); ctx.moveTo(10, 2); ctx.lineTo(22, 2); ctx.lineTo(20, 10); ctx.lineTo(10, 10); ctx.closePath(); ctx.fillStyle = '#FF9900'; ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(-6, 2, 8, 5, -Math.PI / 8, 0, 2 * Math.PI); ctx.fillStyle = '#fff'; ctx.fill(); ctx.stroke();
                ctx.restore();
            }
        };

        // Pipes
        const pipes = {
            position: [], reset() { this.position = []; nextPipeFrame = frames + 150; },
            update() {
                if (currentState !== STATE.PLAYING) return;
                if (frames >= nextPipeFrame) {
                    this.position.push({ x: width, y: Math.random() * (height - 90 - PIPE_GAP - 120) + 60, passed: false });
                    nextPipeFrame = frames + 150 + Math.random() * 50; // wider spacing
                }
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= SPEED;
                    if (!p.passed && p.x + PIPE_WIDTH < bird.x) { score++; hud.innerText = score; p.passed = true; }
                    if (p.x + PIPE_WIDTH < 0) { this.position.shift(); i--; }
                    // collision
                    let cx = bird.x, cy = bird.y, cr = bird.radius * 0.7;
                    let topRect = { x: p.x, y: 0, w: PIPE_WIDTH, h: p.y };
                    let bottomRect = { x: p.x, y: p.y + PIPE_GAP, w: PIPE_WIDTH, h: height - (p.y + PIPE_GAP) };
                    if (rectIntersectCircle(topRect, cx, cy, cr) || rectIntersectCircle(bottomRect, cx, cy, cr)) gameOver();
                }
            },
            draw() {
                for (let p of this.position) {
                    ctx.fillStyle = '#5CB85C'; ctx.fillRect(p.x, 0, PIPE_WIDTH, p.y);
                    ctx.strokeStyle = '#3E8E3E'; ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.y);
                    ctx.fillStyle = '#5CB85C'; ctx.fillRect(p.x, p.y + PIPE_GAP, PIPE_WIDTH, height - (p.y + PIPE_GAP));
                    ctx.strokeStyle = '#3E8E3E'; ctx.strokeRect(p.x, p.y + PIPE_GAP, PIPE_WIDTH, height - (p.y + PIPE_GAP));
                }
            }
        };

        function rectIntersectCircle(rect, cx, cy, cr) {
            let dx = Math.max(rect.x, Math.min(cx, rect.x + rect.w)) - cx;
            let dy = Math.max(rect.y, Math.min(cy, rect.y + rect.h)) - cy;
            return (dx * dx + dy * dy) < cr * cr;
        }

        // Background
        const background = {
            draw() {
                ctx.fillStyle = '#70c5ce'; ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#DED895'; ctx.fillRect(0, height - 60, width, 60);
                ctx.fillStyle = '#73BF2E'; ctx.fillRect(0, height - 60, width, 10);
            }
        };

        function update() { bird.update(); pipes.update(); frames++; }
        function draw() { background.draw(); pipes.draw(); bird.draw(); }
        function loop() { update(); draw(); requestAnimationFrame(loop); }

        bird.reset();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
