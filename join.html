<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Cardistry Club</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #070b14;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;

        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 80%;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #4fd1ff;
        }

        a {
            color: #4fd1ff;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Join Cardistry Club</h2>
        <input placeholder="Username"><br>
        <input placeholder="Email"><br>
        <input placeholder="Skill Level"><br>

        <p><a href="feed.html">Go to Feed</a></p>
    </div>

</html>
